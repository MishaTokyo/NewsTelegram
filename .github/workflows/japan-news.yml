name: Japan news brief

on:
  schedule:
    # 07:00 Japan (JST, UTC+9) → 22:00 UTC
    - cron: "0 22 * * *"
    # 19:00 Japan (JST) → 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      run_kind:
        description: morning or evening
        required: false
        default: morning

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache sent headlines
        uses: actions/cache@v4
        with:
          path: sent_cache.json
          key: news-sent-cache-v1
          restore-keys: news-sent-cache-v1

      - name: Ensure cache file exists
        run: test -f sent_cache.json || echo '{}' > sent_cache.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set run kind
        id: kind
        run: |
          case "${{ github.event.schedule }}" in
            "0 22 * * *") echo "kind=morning" >> "$GITHUB_OUTPUT" ;;
            "0 10 * * *") echo "kind=evening" >> "$GITHUB_OUTPUT" ;;
            *)            echo "kind=${{ github.event.inputs.run_kind || 'morning' }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_KIND: ${{ steps.kind.outputs.kind }}
          SENT_CACHE_FILE: sent_cache.json
